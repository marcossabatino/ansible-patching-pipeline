---
- name: REBOOT | Check if reboot is required
  ansible.builtin.stat:
    path: /var/run/reboot-required
  register: reboot_required_file

- name: REBOOT | Set reboot required fact
  ansible.builtin.set_fact:
    reboot_required: "{{ reboot_required_file.stat.exists }}"

- name: REBOOT | Print reboot decision
  ansible.builtin.debug:
    msg: >
      Reboot required: {{ reboot_required }}.
      Will reboot: {{ reboot_required and reboot_if_required }}.

- name: REBOOT | Reboot host if required
  ansible.builtin.reboot:
    msg: "{{ reboot_msg }}"
    pre_reboot_delay: "{{ reboot_pre_delay }}"
    reboot_timeout: "{{ reboot_timeout }}"
    post_reboot_delay: 15
    test_command: uptime
  when: reboot_required and reboot_if_required

- name: REBOOT | Capture uptime after reboot
  ansible.builtin.shell: uptime -s
  changed_when: false
  register: uptime_after
  when: reboot_required and reboot_if_required
